<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SwiftUtilityKit Language</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0a7cff;
      --border: #dbe3ef;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 70%);
      color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .card {
      width: min(92vw, 520px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a.btn {
      display: inline-block;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--text);
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
    }
    a.btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    .tip {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    code { background: #f3f6fb; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>SwiftUtilityKit</h1>
    <p id="desc">Redirecting by your browser language...</p>
    <div class="actions">
      <a class="btn primary" href="../README.md">中文文档</a>
      <a class="btn" href="../README_EN.md">English Docs</a>
    </div>
    <div class="tip">
      For automatic language switching on GitHub Pages, publish this <code>docs/</code> folder.
    </div>
  </main>

  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || "").toLowerCase();
      var target = lang.indexOf("zh") === 0 ? "../README.md" : "../README_EN.md";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
